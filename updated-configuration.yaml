# Updated Configuration File
# Generated as part of incident remediation
# Date: YYYY-MM-DD
# Incident Reference: INC-YYYY-NNNN

# =============================================================================
# Security Settings
# =============================================================================

security:
  # Authentication configuration
  authentication:
    enabled: true
    method: multi-factor
    session_timeout: 3600
    max_failed_attempts: 5
    lockout_duration: 900

  # Authorization settings
  authorization:
    default_policy: deny
    role_based_access: true
    privilege_escalation: disabled

  # Encryption settings
  encryption:
    data_at_rest:
      enabled: true
      algorithm: AES-256-GCM
      key_rotation_days: 90
    data_in_transit:
      enabled: true
      tls_version: "1.3"
      cipher_suites:
        - TLS_AES_256_GCM_SHA384
        - TLS_CHACHA20_POLY1305_SHA256

  # Audit logging
  audit:
    enabled: true
    log_level: info
    include_timestamps: true
    include_user_identity: true
    retention_days: 365
    destinations:
      - type: file
        path: /var/log/security/audit.log
      - type: syslog
        host: siem.internal.example.com
        port: 514
        protocol: tcp

# =============================================================================
# Network Configuration
# =============================================================================

network:
  # Firewall rules (updated per incident remediation)
  firewall:
    enabled: true
    default_action: deny
    rules:
      - name: allow-https-inbound
        direction: inbound
        action: allow
        protocol: tcp
        port: 443
        source: "0.0.0.0/0"
        logging: true

      - name: allow-ssh-admin
        direction: inbound
        action: allow
        protocol: tcp
        port: 22
        source: "10.0.0.0/8"
        logging: true

      - name: deny-telnet
        direction: inbound
        action: deny
        protocol: tcp
        port: 23
        source: "0.0.0.0/0"
        logging: true

  # Network segmentation
  segmentation:
    enabled: true
    zones:
      - name: dmz
        cidr: "10.1.0.0/24"
        isolation_level: high
      - name: internal
        cidr: "10.2.0.0/24"
        isolation_level: medium
      - name: management
        cidr: "10.3.0.0/24"
        isolation_level: critical

# =============================================================================
# Application Settings
# =============================================================================

application:
  # Rate limiting (updated per incident remediation)
  rate_limiting:
    enabled: true
    requests_per_minute: 100
    burst_limit: 150
    by_ip: true
    by_user: true

  # Input validation
  input_validation:
    enabled: true
    sanitize_html: true
    max_request_size_mb: 10
    allowed_content_types:
      - application/json
      - application/x-www-form-urlencoded
      - multipart/form-data

  # Error handling
  error_handling:
    show_details: false
    log_errors: true
    custom_error_pages: true

# =============================================================================
# Monitoring and Alerting
# =============================================================================

monitoring:
  # Health checks
  health_checks:
    enabled: true
    interval_seconds: 30
    endpoints:
      - /health
      - /ready
      - /live

  # Metrics collection
  metrics:
    enabled: true
    exporter: prometheus
    port: 9090
    path: /metrics

  # Alerting rules (updated per incident remediation)
  alerts:
    - name: high-error-rate
      condition: error_rate > 0.05
      window: 5m
      severity: critical
      notify:
        - pagerduty
        - slack-security

    - name: unusual-access-pattern
      condition: access_anomaly_score > 0.8
      window: 1m
      severity: high
      notify:
        - slack-security

    - name: resource-exhaustion
      condition: cpu_usage > 0.9 or memory_usage > 0.9
      window: 5m
      severity: warning
      notify:
        - slack-ops

# =============================================================================
# Backup and Recovery
# =============================================================================

backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention:
    daily: 7
    weekly: 4
    monthly: 12
  destination:
    type: s3
    bucket: backup-bucket-name
    region: us-east-1
    encryption: true
  verification:
    enabled: true
    test_restore_weekly: true

# =============================================================================
# Incident Response Configuration
# =============================================================================

incident_response:
  enabled: true
  auto_containment:
    enabled: true
    actions:
      - isolate_affected_host
      - block_suspicious_ip
      - revoke_compromised_credentials
  escalation:
    levels:
      - name: L1
        timeout_minutes: 15
        contacts:
          - on-call-engineer
      - name: L2
        timeout_minutes: 30
        contacts:
          - security-lead
          - engineering-manager
      - name: L3
        timeout_minutes: 60
        contacts:
          - ciso
          - cto
  communication:
    status_page: enabled
    internal_channel: "#incident-response"
    external_template: incident-communication-template.md

# =============================================================================
# End of Configuration
# =============================================================================
